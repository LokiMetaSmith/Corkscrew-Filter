# corkscrew_config.yaml
project_name: "Parametric_Corkscrew_Filter"
geometry:
  scad_file: "corkscrew.scad"
  fluid_volume_module: "modular_filter_assembly"
  parameters:
    part_to_generate: { type: "string", default: "modular_filter_assembly" }
    num_bins: { type: "int", min: 1, max: 3, default: 1 }
    number_of_complete_revolutions: { type: "float", min: 1.0, max: 4.0, default: 2.0 }
    helix_path_radius_mm: { type: "float", min: 1.5, max: 5.0, default: 1.8 }
    helix_profile_radius_mm: { type: "float", min: 1.5, max: 5.0, default: 1.7 }
    helix_void_profile_radius_mm: { type: "float", min: 0.5, max: 2.0, default: 1.0 }
    helix_profile_scale_ratio: { type: "float", min: 1.0, max: 2.0, default: 1.4 }
    tube_od_mm: { type: "float", default: 32.0, constant: true }
    insert_length_mm: { type: "float", min: 40.0, max: 60.0, default: 50.0 }
    slit_axial_length_mm: { type: "float", min: 1.0, max: 3.0, default: 2.0 }
    slit_chamfer_height: { type: "float", min: 0.1, max: 1.0, default: 0.5 }
    add_layers: { type: "bool", default: true }
    GENERATE_CFD_VOLUME: { type: "bool", default: true, constant: true }
    target_cell_size: { type: "float", min: 1.5, max: 5.0, default: 2.5 }

physics:
  solver: "simpleFoam"
  fluid: "air" # Requires transportProperties in constant
  boundaries:
    inlet:
      type: "patch"
      U: "fixedValue uniform (0 0 5)"
    outlet:
      type: "patch"
      p: "fixedValue uniform 0"
    corkscrew:
      type: "wall"
      U: "fixedValue uniform (0 0 0)"
  particles:
    active: true
    rho0: 3100
    sizes_um: [5, 10, 20, 50, 100]

optimization:
  target: "maximize"
  objective_function: "separation_efficiency"
  constraints: >
    - helix_path_radius_mm > helix_void_profile_radius_mm (to ensure structural integrity if solid, but for fluid volume this defines the channel).
    - helix_profile_radius_mm must be > helix_void_profile_radius_mm (e.g., by at least 1mm) to generate valid geometry.
    - helix_profile_radius_mm must be <= helix_path_radius_mm to prevent self-intersection at the center axis.
    - Ensure `slit_chamfer_height` < `slit_axial_length_mm`.
    - CONSTRAINT: `helix_profile_radius_mm` must be STRICTLY LESS than `helix_path_radius_mm` (e.g. at least 0.5mm less) to avoid center-axis singularities. Do not set them equal.
  description: >
    You are an expert engineer optimizing a 3D printed inertial filter (corkscrew shape) using OpenSCAD and OpenFOAM.
    The application is separating MOON DUST (Lunar Regolith, density ~3000 kg/m^3, particle size ~20 microns) from air.
    The mechanism is inertial separation via centrifugal force generated by the helical screw.
    GOAL: Optimize the design parameters to meet the following STRICT SUCCESS CRITERIA:
    1. Particle Collection Efficiency > 99.95%
    2. Pressure Drop < 0.7 PSI
    Maximize efficiency first, then minimize pressure drop.
  extractors:
    - type: "surfaceFieldValue"
      function_name: "inletPressure"
      metric_name: "p_in"
    - type: "surfaceFieldValue"
      function_name: "outletPressure"
      metric_name: "p_out"

cfd_settings:
  turbulence_model: "RNGkEpsilon"
  mesh_decompose_method: "hierarchical"
  solve_decompose_method: "scotch"
  # mesh_processors: 4 # Override for parallel meshing (default: num_processors)
  # solve_processors: 4 # Override for parallel solving (default: num_processors)
  fallback_wall_functions:
    nut: "nutkWallFunction"
    epsilon: "zeroGradient"
    k: "zeroGradient"
  initial_fields:
    k:
      internalField: "uniform 0.375"
      wallFunction: "kqRWallFunction"
    epsilon:
      internalField: "uniform 14.855"
      wallFunction: "epsilonWallFunction"
  relaxation_factors:
    p: 0.2
    U: 0.5
    k: 0.5
    epsilon: 0.5
